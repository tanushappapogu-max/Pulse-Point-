name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pulse-point/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: pulse-point

      - name: Build
        run: npm run build
        working-directory: pulse-point
        env:
          # No AI keys needed — AI fallback removed
          NODE_ENV: production

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pulse-point/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
